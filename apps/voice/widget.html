<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/logo.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SIULK Widget</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
    }

    html,
    body,
    #widget-root {
      margin: 0;
      padding: 0;
      background: transparent !important;
      background-color: transparent !important;
      overflow: hidden;
      width: 100%;
      height: 100%;
      border: none !important;
      outline: none !important;
      outline-offset: 0 !important;
      box-shadow: none !important;
      -webkit-app-region: no-drag;
    }

    body::before,
    body::after {
      display: none !important;
    }

    /* Animated gradient border — hue cycling + glow pulse */
    @keyframes siulk-hue-cycle {
      0% { filter: hue-rotate(0deg); }
      100% { filter: hue-rotate(360deg); }
    }

    @keyframes siulk-glow-pulse {
      0%, 100% { opacity: 0.3; transform: scale(1); }
      50% { opacity: 0.75; transform: scale(1.04); }
    }

    @keyframes siulk-glow-pulse-rec {
      0%, 100% { opacity: 0.55; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.06); }
    }

    @keyframes siulk-shimmer {
      0% { background-position: -200% center; }
      100% { background-position: 200% center; }
    }
  </style>
</head>

<body>
  <div id="widget-root"></div>
  <script type="module" src="/src/widget-entry.tsx"></script>
</body>

</html>
