name: Release SIULK-VOICE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Install Dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Type-check
        run: npx tsc --noEmit
      - name: Unit Tests
        run: npx vitest run

  build-tauri:
    needs: test-and-lint
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest' 
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libxdo-dev libasound2-dev

      - name: install frontend deps
        run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: 'SIULK-VOICE v__VERSION__'
          releaseBody: |
            ## Downloads

            ### Windows
            - Portable executable (`.exe`)
            - Installer (`.msi` / setup bundle when generated)

            ### macOS
            - Apple Silicon (`aarch64-apple-darwin`)
            - Intel (`x86_64-apple-darwin`)
            - DMG / app bundles

            ### Linux
            - AppImage
            - DEB package

            ## Notes
            - Built automatically from the GitHub Actions release matrix.
            - If an asset is still missing, wait for the remaining platform jobs to finish.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
