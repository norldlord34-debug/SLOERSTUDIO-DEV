name: CI — SloerVoice

on:
  push:
    branches: [main, develop]
    paths:
      - "apps/voice/**"
      - "packages/**"
      - ".github/workflows/ci-voice.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "apps/voice/**"
      - "packages/**"

jobs:
  lint-test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --workspace=apps/voice

      - name: Lint
        run: npm run lint --workspace=apps/voice

      - name: Unit tests
        run: npm run test:unit --workspace=apps/voice

  typecheck:
    name: TypeScript check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --workspace=apps/voice

      - name: Build (tsc + vite)
        run: npm run build --workspace=apps/voice

  rust-check:
    name: Rust check (sloervoice)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./apps/voice/src-tauri -> target"

      - name: Install Linux Tauri + audio dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev \
            libappindicator3-dev librsvg2-dev patchelf \
            libasound2-dev libpulse-dev

      - name: cargo check
        run: |
          export LD_LIBRARY_PATH=$(echo "${LD_LIBRARY_PATH}" | tr ':' '\n' | grep -v '^$' | tr '\n' ':' | sed 's/:$//')
          cargo check
        working-directory: apps/voice/src-tauri
