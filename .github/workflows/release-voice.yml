name: Release — SloerVoice

on:
  push:
    tags:
      - "v*.*.*-voice"
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
          - platform: macos-latest
            target: x86_64-apple-darwin
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./apps/voice/src-tauri -> target"

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev \
            libappindicator3-dev librsvg2-dev patchelf \
            libasound2-dev libpulse-dev

      - name: Install frontend dependencies
        run: npm ci --workspace=apps/voice

      - name: Build SloerVoice
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/voice
          tagName: ${{ github.ref_name }}
          releaseName: "SloerVoice ${{ github.ref_name }}"
          releaseBody: |
            ## SloerVoice Release

            > ⚠️ Whisper model NOT included. Download separately:
            > https://huggingface.co/ggerganov/whisper.cpp

            Place the model file in the app's data directory before first launch.
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}
