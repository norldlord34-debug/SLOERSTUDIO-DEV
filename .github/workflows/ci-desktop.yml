name: CI — SloerSpace Dev (Desktop)

on:
  push:
    branches: [main, develop]
    paths:
      - "apps/desktop/**"
      - "packages/**"
      - ".github/workflows/ci-desktop.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "apps/desktop/**"
      - "packages/**"

jobs:
  lint-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --workspace=apps/desktop

      - name: Typecheck
        run: npm run typecheck --workspace=apps/desktop

      - name: Lint
        run: npm run lint --workspace=apps/desktop

