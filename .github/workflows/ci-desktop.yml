name: CI — SloerSpace Dev (Desktop)

on:
  push:
    branches: [main, develop]
    paths:
      - "apps/desktop/**"
      - "packages/**"
      - ".github/workflows/ci-desktop.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "apps/desktop/**"
      - "packages/**"

jobs:
  lint-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --workspace=apps/desktop

      - name: Typecheck
        run: npm run typecheck --workspace=apps/desktop

      - name: Lint
        run: npm run lint --workspace=apps/desktop

  build-frontend:
    name: Build Next.js frontend
    runs-on: ubuntu-latest
    needs: lint-typecheck
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --workspace=apps/desktop

      - name: Build Next.js
        run: npm run build --workspace=apps/desktop

  rust-check:
    name: Rust check (fast, no compile)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./apps/desktop/src-tauri -> target"

      - name: Install Linux Tauri dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev \
            libappindicator3-dev librsvg2-dev patchelf

      - name: cargo check
        run: cargo check
        working-directory: apps/desktop/src-tauri
        env:
          LD_LIBRARY_PATH: ""
